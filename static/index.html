<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🖨</text></svg>">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SKU PRINT TERMINAL</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --green:#1ec024;--green-dim:#0d6e10;--green-bright:#4fff55;
  --green-glow:rgba(30,192,36,0.15);--bg:#050a05;--bg2:#080f08;--bg3:#0c160c;
  --border:rgba(30,192,36,0.25);--border-bright:rgba(30,192,36,0.6);
  --text:#a8d4a9;--text-dim:#4a7a4b;--red:#ff4444;--amber:#ffaa00;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Share Tech Mono',monospace;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.08) 2px,rgba(0,0,0,0.08) 4px);pointer-events:none;z-index:0;}
.scanline{position:fixed;top:-100%;left:0;right:0;height:40px;background:linear-gradient(transparent,rgba(30,192,36,0.04),transparent);animation:scan 6s linear infinite;pointer-events:none;z-index:0;}
@keyframes scan{0%{top:-5%}100%{top:105%}}
@keyframes blink{0%,49%{opacity:1}50%,100%{opacity:0}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ── Header ── */
header{background:var(--bg2);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.logo{font-family:'Orbitron',monospace;font-size:16px;font-weight:900;color:var(--green);letter-spacing:0.15em;text-shadow:0 0 20px rgba(30,192,36,0.5);text-decoration:none;}
.logo span{color:var(--dim);font-size:11px;font-weight:400;margin-left:10px;letter-spacing:0.05em;}
.status-bar{display:flex;align-items:center;gap:10px;font-size:11px;color:var(--text-dim);flex-wrap:wrap;}
.status-dot{width:8px;height:8px;border-radius:50%;background:var(--text-dim);display:inline-block;margin-right:6px;}
.status-dot.online{background:var(--green);box-shadow:0 0 6px var(--green);animation:blink 2s infinite;}
.status-dot.offline{background:var(--red);}
.nav-btn{padding:6px 10px;border:1px solid var(--border);color:var(--text-dim);font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:0.03em;text-decoration:none;transition:all 0.15s;background:transparent;white-space:nowrap;}
.nav-btn:hover{border-color:var(--green);color:var(--green);}

/* ── Layout ── */
.main{max-width:1100px;margin:0 auto;padding:24px;display:grid;grid-template-columns:1fr 1fr;gap:14px;}

/* ── Panel ── */
.panel{background:var(--bg2);border:1px solid var(--border);border-radius:2px;overflow:hidden;animation:fadeIn 0.4s ease both;}
.panel:nth-child(2){animation-delay:0.05s;}
.panel:nth-child(3){animation-delay:0.10s;}
.panel:nth-child(4){animation-delay:0.15s;}
.panel:nth-child(5){animation-delay:0.20s;grid-column:1/-1;}
.panel:nth-child(6){animation-delay:0.25s;grid-column:1/-1;}
.panel-header{background:var(--bg3);border-bottom:1px solid var(--border);padding:10px 16px;font-family:'Orbitron',monospace;font-size:11px;font-weight:700;color:var(--green);letter-spacing:0.12em;display:flex;align-items:center;gap:8px;}
.panel-header::before{content:'▶';font-size:8px;color:var(--green-dim);}
.panel-body{padding:18px 16px;}

/* ── SKU display ── */
.sku-display{font-family:'Orbitron',monospace;font-size:56px;font-weight:900;color:var(--green);text-shadow:0 0 30px rgba(30,192,36,0.4);line-height:1;letter-spacing:0.05em;margin-bottom:6px;}
.sku-label{font-size:11px;color:var(--text-dim);letter-spacing:0.1em;margin-bottom:18px;}

/* ── Buttons ── */
.btn{display:block;width:100%;padding:10px 16px;background:transparent;border:1px solid var(--border);color:var(--text);font-family:'Share Tech Mono',monospace;font-size:13px;cursor:pointer;text-align:left;letter-spacing:0.05em;transition:all 0.15s;margin-bottom:8px;border-radius:1px;}
.btn:last-child{margin-bottom:0;}
.btn::before{content:'> ';color:var(--green-dim);}
.btn:hover{background:var(--green-glow);border-color:var(--green);color:var(--green-bright);text-shadow:0 0 8px rgba(30,192,36,0.5);}
.btn:active{transform:scale(0.98);}
.btn.primary{border-color:var(--green-dim);color:var(--green);}
.btn.primary:hover{background:rgba(30,192,36,0.2);border-color:var(--green-bright);box-shadow:0 0 12px rgba(30,192,36,0.2);}
.btn.danger{border-color:var(--green-dim);color:var(--green);}
.btn.danger:hover{background:rgba(30,192,36,0.2);border-color:var(--green-bright);}
.btn.danger::before{color:var(--green-dim);}

/* ── Inputs ── */
.input-row{display:flex;gap:8px;margin-bottom:10px;align-items:center;}
.input-label{font-size:11px;color:var(--text-dim);letter-spacing:0.08em;min-width:90px;}
input[type=text],input[type=number]{background:var(--bg);border:1px solid var(--border);color:var(--green-bright);font-family:'Share Tech Mono',monospace;font-size:13px;padding:7px 10px;flex:1;outline:none;border-radius:1px;transition:border-color 0.15s;}
input:focus{border-color:var(--green);box-shadow:0 0 8px rgba(30,192,36,0.15);}
.btn-sm{padding:7px 14px;background:transparent;border:1px solid var(--border);color:var(--text);font-family:'Share Tech Mono',monospace;font-size:12px;cursor:pointer;letter-spacing:0.05em;transition:all 0.15s;white-space:nowrap;border-radius:1px;}
.btn-sm:hover{background:var(--green-glow);border-color:var(--green);color:var(--green-bright);}
.divider{border:none;border-top:1px solid var(--border);margin:14px 0;}

/* ── Log ── */
.log-area{background:var(--bg);border:1px solid var(--border);padding:12px 14px;height:200px;overflow-y:auto;font-size:12px;color:var(--text-dim);line-height:1.8;border-radius:1px;}
.log-area::-webkit-scrollbar{width:4px;}
.log-area::-webkit-scrollbar-thumb{background:var(--green-dim);border-radius:2px;}
.log-line .ts{color:var(--text-dim);}
.log-line .sku-num{color:var(--green);}
.log-line .action{color:var(--text);}
.cursor::after{content:'█';animation:blink 1s infinite;color:var(--green);font-size:0.8em;}

.confirm-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:3000;align-items:center;justify-content:center;}
.confirm-modal.show{display:flex;}
.confirm-box{background:#0a0000;border:1px solid rgba(255,68,68,0.6);padding:28px 32px;border-radius:2px;text-align:center;max-width:340px;}
.confirm-box .msg{font-size:14px;color:#ff8888;letter-spacing:0.05em;margin-bottom:20px;line-height:1.5;}
.confirm-btns{display:flex;gap:10px;justify-content:center;}
.confirm-yes{padding:9px 28px;background:rgba(255,68,68,0.15);border:1px solid #ff4444;color:#ff4444;font-family:'Share Tech Mono',monospace;font-size:13px;cursor:pointer;letter-spacing:0.1em;border-radius:1px;transition:all 0.15s;}
.confirm-yes:hover{background:rgba(255,68,68,0.3);}
.confirm-no{padding:9px 28px;background:rgba(255,68,68,0.05);border:1px solid rgba(255,68,68,0.3);color:rgba(255,68,68,0.5);font-family:'Share Tech Mono',monospace;font-size:13px;cursor:pointer;letter-spacing:0.1em;border-radius:1px;transition:all 0.15s;}
.confirm-no:hover{background:rgba(255,68,68,0.1);color:#ff8888;}

/* ── Reboot splash ── */
.reboot-splash{display:none;position:fixed;inset:0;background:#050a05;z-index:9999;align-items:center;justify-content:center;flex-direction:column;gap:24px;}
.reboot-splash.show{display:flex;}
.splash-title{font-family:'Orbitron',monospace;font-size:20px;font-weight:900;color:#1ec024;letter-spacing:0.2em;text-shadow:0 0 30px rgba(30,192,36,0.6);text-align:center;}
.splash-count{font-family:'Orbitron',monospace;font-size:80px;font-weight:900;color:#1ec024;text-shadow:0 0 40px rgba(30,192,36,0.5);line-height:1;}
.splash-status{font-family:'Share Tech Mono',monospace;font-size:13px;color:#4a7a4b;letter-spacing:0.08em;text-align:center;max-width:400px;line-height:1.6;}
.splash-bar-track{width:320px;height:3px;background:#0c160c;border-radius:2px;overflow:hidden;}
.splash-bar-fill{height:100%;background:#1ec024;border-radius:2px;transition:width 1s linear;}

/* ── Toast ── */
.toast{position:fixed;bottom:30vh;left:50%;transform:translateX(-50%) translateY(10px);padding:10px 24px;background:var(--bg3);border:1px solid var(--border);font-size:13px;color:var(--green);letter-spacing:0.05em;opacity:0;transition:opacity 0.2s,transform 0.2s;z-index:2000;border-radius:1px;max-width:400px;text-align:center;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.error{border-color:rgba(255,68,68,0.5);color:var(--red);}

@media(max-width:680px){.main{grid-template-columns:1fr;}.panel:nth-child(5){grid-column:1;}.sku-display{font-size:clamp(32px,10vw,52px);}.logo span{color:var(--dim);font-size:11px;font-weight:400;margin-left:10px;letter-spacing:0.05em;}}
</style>
</head>
<body>
<div class="scanline"></div>

<header>
  <a href="/" style="text-decoration:none"><div class="logo">SKU//PRINT <span>CONTROL TERMINAL v1.0</span></div></a>
  <div class="status-bar">
    <div>
      <span class="status-dot" id="printer-dot"></span>
      <span id="printer-status">CHECKING...</span>
    </div>
    <div class="printer-ip-wrap">PRINTER: <span id="printer-ip-display" style="color:var(--green)">--</span></div>
    <div class="sku-wrap">SKU: <span id="header-sku" style="color:var(--green)">--</span></div>
    <a href="/system" class="nav-btn">SYS MGT ›</a>
  </div>
</header>

<div class="main">

  <!-- Quick Print -->
  <div class="panel">
    <div class="panel-header">QUICK PRINT</div>
    <div class="panel-body">
      <div class="sku-display" id="sku-big">----</div>
      <div class="sku-label">NEXT SKU / CURRENT COUNTER</div>
      <button class="btn primary" onclick="printNext()">PRINT NEXT SKU</button>
      <button class="btn" onclick="printReprint()">REPRINT LAST SKU</button>
      <button class="btn" onclick="printBlank()">PRINT BLANK LABEL</button>
    </div>
  </div>

  <!-- Custom Label -->
  <div class="panel">
    <div class="panel-header">CUSTOM LABEL</div>
    <div class="panel-body">
      <div class="input-row">
        <span class="input-label">SKU NUMBER</span>
        <input type="text" id="custom-sku" placeholder="e.g. 2001">
      </div>
      <div class="input-row">
        <span class="input-label">CUSTOM TEXT</span>
        <input type="text" id="custom-text" placeholder="max 38 chars" maxlength="38">
      </div>
      <hr class="divider">
      <button class="btn primary" onclick="printCustom()">PRINT CUSTOM LABEL</button>
    </div>
  </div>

  <!-- Batch Print -->
  <div class="panel">
    <div class="panel-header">BATCH PRINT</div>
    <div class="panel-body">
      <div class="input-row">
        <span class="input-label">START SKU</span>
        <input type="number" id="batch-start" placeholder="e.g. 2000">
      </div>
      <div class="input-row">
        <span class="input-label">QUANTITY</span>
        <input type="number" id="batch-count" placeholder="e.g. 10" min="1" max="100">
      </div>
      <hr class="divider">
      <button class="btn primary" onclick="printBatch()">PRINT BATCH</button>
      <div id="batch-progress" style="font-size:12px;color:var(--text-dim);margin-top:10px;min-height:18px;"></div>
    </div>
  </div>

  <!-- Configuration -->
  <div class="panel">
    <div class="panel-header">CONFIGURATION</div>
    <div class="panel-body">
      <div class="input-row">
        <span class="input-label">PRINTER IP</span>
        <input type="text" id="cfg-ip" placeholder="10.10.10.249">
        <button class="btn-sm" onclick="saveConfig()">SET</button>
      </div>
      <div class="input-row">
        <span class="input-label">SET SKU TO</span>
        <input type="number" id="cfg-sku" placeholder="e.g. 1490">
        <button class="btn-sm" onclick="setSKU()">SET</button>
      </div>
      <hr class="divider">
      <button class="btn danger" onclick="if(confirm('Reset SKU counter to 2000?')) resetSKU()">RESET SKU COUNTER</button>
    </div>
  </div>

  <!-- Print Log -->
  <div class="panel">
    <div class="panel-header">
      PRINT LOG
      <span style="color:var(--text-dim);font-family:'Share Tech Mono',monospace;font-weight:400;font-size:10px;margin-left:6px;letter-spacing:0">— LAST 50 ENTRIES</span>
    </div>
    <div class="panel-body">
      <div class="log-area" id="log-area">
        <span class="cursor">LOADING LOG</span>
      </div>
    </div>
  </div>


  <!-- System Controls -->
  <div class="panel">
    <div class="panel-header">SYSTEM CONTROLS</div>
    <div class="panel-body">
      <button class="btn primary" onclick="restartPrintScript()">RESTART PRINT SCRIPT</button>
      <button class="btn danger" onclick="confirmAction('Reboot SRV?', rebootPi)">REBOOT SRV</button>
      <button class="btn danger" onclick="confirmAction('Shut down SRV? Physical access needed to restart.', shutdownPi)">SHUTDOWN SRV</button>
    </div>
  </div>

</div>

<div class="confirm-modal" id="confirm-modal">
  <div class="confirm-box">
    <div class="msg" id="confirm-msg"></div>
    <div class="confirm-btns">
      <button class="confirm-yes" id="confirm-yes" onclick="confirmYes()">YES</button>
      <button class="confirm-no" onclick="confirmNo()">NO</button>
    </div>
  </div>
</div>
<div class="reboot-splash" id="reboot-splash">
  <div class="splash-title" id="splash-title">REBOOTING SRV</div>
  <div class="splash-count" id="splash-count">40</div>
  <div class="splash-status" id="splash-status"></div>
  <div class="splash-bar-track"><div class="splash-bar-fill" id="splash-bar" style="width:100%"></div></div>
</div>
<div class="toast" id="toast"></div>

<script>
const API = '';

function toast(msg, isError=false) {
  const el = document.getElementById('toast');
  el.textContent = (isError ? '✗ ' : '✓ ') + msg;
  el.className = 'toast show' + (isError ? ' error' : '');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.className = 'toast', 3000);
}

async function api(path, method='GET', body=null) {
  const opts = { method, headers: {'Content-Type':'application/json'} };
  if (body) opts.body = JSON.stringify(body);
  return (await fetch(API + path, opts)).json();
}

async function refreshStatus() {
  try {
    const d = await api('/api/status');
    document.getElementById('sku-big').textContent          = d.current_sku;
    document.getElementById('header-sku').textContent       = d.current_sku;
    document.getElementById('printer-ip-display').textContent = d.printer_ip;
    document.getElementById('cfg-ip').placeholder           = d.printer_ip;
    const dot = document.getElementById('printer-dot');
    const st  = document.getElementById('printer-status');
    if (d.printer_online) {
      dot.className = 'status-dot online';
      st.textContent = 'PRINTER ONLINE';
      st.style.color = 'var(--green)';
    } else {
      dot.className = 'status-dot offline';
      st.textContent = 'PRINTER OFFLINE';
      st.style.color = 'var(--red)';
    }
  } catch(e) {
    document.getElementById('printer-status').textContent = 'API OFFLINE';
    document.getElementById('printer-status').style.color = 'var(--red)';
  }
}

async function refreshLog() {
  try {
    const d  = await api('/api/log');
    const el = document.getElementById('log-area');
    if (!d.lines.length) {
      el.innerHTML = '<span style="color:var(--text-dim)">NO ENTRIES YET</span>';
      return;
    }
    el.innerHTML = d.lines.map(l => {
      const p = l.split(' — ');
      if (p.length >= 3) {
        return `<div class="log-line"><span class="ts">${p[0]}</span> <span style="color:var(--border-bright)">—</span> SKU <span class="sku-num">${p[1].replace('SKU ','')}</span> <span style="color:var(--border-bright)">—</span> <span class="action">${p[2]}</span></div>`;
      }
      return `<div class="log-line">${l}</div>`;
    }).join('');
  } catch(e) {}
}

async function printNext() {
  const d = await api('/api/print/next', 'POST');
  if (d.ok) { toast(`SKU ${d.sku} printed — next: ${d.next}`); refreshStatus(); refreshLog(); }
  else toast(d.error || 'Print failed', true);
}

async function printReprint() {
  const d = await api('/api/print/reprint', 'POST');
  if (d.ok) { toast(`SKU ${d.sku} reprinted`); refreshLog(); }
  else toast(d.error || 'Reprint failed', true);
}

async function printBlank() {
  const d = await api('/api/print/blank', 'POST');
  d.ok ? toast('Blank label sent') : toast(d.error || 'Failed', true);
}

async function printCustom() {
  const sku  = document.getElementById('custom-sku').value.trim();
  const text = document.getElementById('custom-text').value.trim();
  if (!sku) { toast('SKU number required', true); return; }
  const d = await api('/api/print/custom', 'POST', { sku, text });
  if (d.ok) { toast(`Custom label printed: SKU ${d.sku}`); refreshLog(); }
  else toast(d.error || 'Failed', true);
}

async function printBatch() {
  const start = document.getElementById('batch-start').value;
  const count = document.getElementById('batch-count').value;
  if (!start || !count) { toast('Start SKU and quantity required', true); return; }
  const prog = document.getElementById('batch-progress');
  prog.textContent = 'PRINTING...';
  const d = await api('/api/print/batch', 'POST', { start: parseInt(start), count: parseInt(count) });
  prog.textContent = `DONE — ${d.printed} of ${d.results.length} printed`;
  toast(`Batch complete: ${d.printed} labels`);
  refreshStatus(); refreshLog();
}

async function saveConfig() {
  const ip = document.getElementById('cfg-ip').value.trim();
  if (!ip) { toast('Enter a printer IP', true); return; }
  const d = await api('/api/config', 'POST', { printer_ip: ip });
  if (d.ok) { toast(`Printer IP set to ${ip}`); refreshStatus(); }
}

async function setSKU() {
  const sku = document.getElementById('cfg-sku').value;
  if (!sku) { toast('Enter a SKU number', true); return; }
  const d = await api('/api/config', 'POST', { sku: parseInt(sku) });
  if (d.ok) { toast(`SKU counter set to ${sku}`); refreshStatus(); }
}

async function resetSKU() {
  const d = await api('/api/config', 'POST', { sku: 2000 });
  if (d.ok) { toast('SKU counter reset to 2000'); refreshStatus(); }
}


async function restartPrintScript() {
  const d = await fetch('/api/system/service/pil0t-tracker/restart', {method:'POST',headers:{'Content-Type':'application/json'}});
  const j = await d.json();
  j.ok ? toast('Print script restarted') : toast(j.error || 'Failed', true);
}

async function rebootPi() {
  await fetch('/api/system/reboot', {method:'POST',headers:{'Content-Type':'application/json'}});
  showSplash(false);
}

async function shutdownPi() {
  await fetch('/api/system/shutdown', {method:'POST',headers:{'Content-Type':'application/json'}});
  showSplash(true);
}
let _confirmCb = null;
function confirmAction(msg, cb) {
  _confirmCb = cb;
  document.getElementById('confirm-msg').textContent = msg;
  document.getElementById('confirm-modal').classList.add('show');
}
function confirmYes() { document.getElementById('confirm-modal').classList.remove('show'); if(_confirmCb){_confirmCb();_confirmCb=null;} }
function confirmNo()  { document.getElementById('confirm-modal').classList.remove('show'); _confirmCb=null; }


var SHUTDOWN_QUOTES = ['Powering down systems one by one… like a professional...', 'Telling services to wrap it up...', "Initiating shutdown. Let's see what breaks...", "Cleaning up before I leave. You're welcome...", "Starting shutdown. Don't touch anything...", 'Bringing everything to a stop. Finally...', "I'm going to sleep. Good luck without me..."];

function showSplash(isShutdown) {
  var splash  = document.getElementById('reboot-splash');
  var title   = document.getElementById('splash-title');
  var count   = document.getElementById('splash-count');
  var status  = document.getElementById('splash-status');
  var bar     = document.getElementById('splash-bar');
  splash.classList.add('show');

  if (isShutdown) {
    title.textContent = 'SHUTTING DOWN';
    count.textContent = '';
    bar.style.width   = '100%';
    var qi = 0;
    status.textContent = SHUTDOWN_QUOTES[0];
    var quoteTimer = setInterval(function() {
      qi++;
      if (qi < SHUTDOWN_QUOTES.length) {
        status.textContent = SHUTDOWN_QUOTES[qi];
        bar.style.transition = 'width 2s linear';
        bar.style.width = ((1 - qi / SHUTDOWN_QUOTES.length) * 100) + '%';
      } else {
        clearInterval(quoteTimer);
        status.textContent = 'System offline. Poke me when you need me again.';
        bar.style.width = '0%';
        title.textContent = 'SYSTEM OFFLINE';
      }
    }, 2000);
    return;
  }

  // Reboot countdown
  title.textContent = 'REBOOTING SRV';
  var seconds = 40;
  count.textContent = seconds;
  bar.style.width   = '100%';
  status.textContent = 'Waiting for ' + (window._hostname || location.hostname) + ' to come back online...';

  var tick = setInterval(function() {
    seconds--;
    count.textContent = Math.max(seconds, 0);
    bar.style.width = (seconds / 40 * 100) + '%';
    if (seconds <= 0) {
      clearInterval(tick);
      count.textContent = '';
      status.textContent = 'Attempting to reconnect...';
      tryReconnect();
    }
  }, 1000);
}

function tryReconnect() {
  var status   = document.getElementById('splash-status');
  var attempts = 0;
  var interval = setInterval(async function() {
    attempts++;
    status.textContent = 'Reconnecting... attempt ' + attempts;
    try {
      var r = await fetch('/api/status', {signal: AbortSignal.timeout(3000)});
      if (r.ok) {
        clearInterval(interval);
        status.textContent = 'Back online! Reloading...';
        setTimeout(function(){ location.reload(); }, 800);
      }
    } catch(e) {}
  }, 2000);
}

refreshStatus();
refreshLog();
// Load hostname for reboot splash
fetch('/api/system/info').then(function(r){return r.json();}).then(function(d){
  if(d.hostname) window._hostname = d.hostname;
}).catch(function(){});
setInterval(refreshStatus, 10000);
setInterval(refreshLog, 15000);

// Load branding
fetch('/api/branding').then(r=>r.json()).then(d=>{
  if (!d.ok) return;
  const b = d.branding;
  const logo = document.querySelector('.logo');
  if (logo && b.title) logo.innerHTML = b.title + '<span>' + (b.subtitle || 'CONTROL TERMINAL v1.0') + '</span>';
  if (b.title) document.title = b.title;
}).catch(()=>{});

</script>
</body>
</html>
